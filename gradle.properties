# Metaspace raised from 384m: with kotlin.compiler.execution.strategy=in-process,
# one build running test+lint+debug+release compilation loads the Kotlin compiler
# repeatedly into the same daemon and exhausted 384m (OOM in compileReleaseKotlin).
org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8
org.gradle.workers.max=1
org.gradle.parallel=false
org.gradle.caching=false
org.gradle.daemon=false
kotlin.compiler.execution.strategy=in-process
android.nonTransitiveRClass=true
